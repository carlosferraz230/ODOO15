version: '3.1'

services:
  db:
    image: postgres:13
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  odoo:
    build: .
    depends_on:
      - db
    ports:
      - "8054:8069"
    volumes:
      - odoo_data:/var/lib/odoo           # dados persistentes
      - ./etc:/etc/odoo.conf #config custom
      - ./addons:/mnt/extra-addons        # addons extras
      - ./addons-dev-15:/mnt/addons-dev-15
    restart: unless-stopped

volumes:
  db_data:
  odoo_data: